
services:
  postgres:
    image: postgres:17
    container_name: postgres-db
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: taskdb

    ports:
      - "5432:5432"

    volumes:
      - taskdb_data:/var/lib/postgresql/data

volumes:
  taskdb_data: